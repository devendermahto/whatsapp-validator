<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Validator</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; color: #fff; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; margin-bottom: 30px; color: #00d9ff; }
        .card { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 25px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .card h2 { margin-bottom: 15px; color: #00d9ff; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #aaa; }
        input, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #0f0f23; color: #fff; font-size: 14px; }
        input:focus, textarea:focus { outline: none; border-color: #00d9ff; }
        button { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-size: 16px; font-weight: 600; transition: all 0.3s; }
        .btn-primary { background: #00d9ff; color: #1a1a2e; }
        .btn-primary:hover { background: #00b8d4; transform: translateY(-2px); }
        .btn-success { background: #00ff88; color: #1a1a2e; }
        .btn-success:hover { background: #00cc6a; }
        .btn-download { background: #ff6b6b; color: #fff; }
        .status-indicator { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
        .status-connected { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .status-disconnected { background: #ff4444; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .stat-box { text-align: center; padding: 20px; border-radius: 10px; background: rgba(255,255,255,0.05); }
        .stat-box .count { font-size: 32px; font-weight: bold; }
        .stat-box.valid { border: 2px solid #00ff88; }
        .stat-box.valid .count { color: #00ff88; }
        .stat-box.invalid { border: 2px solid #ff4444; }
        .stat-box.invalid .count { color: #ff4444; }
        .stat-box.error { border: 2px solid #ffaa00; }
        .stat-box.error .count { color: #ffaa00; }
        .progress-container { margin-top: 20px; display: none; }
        .progress-bar { height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00d9ff, #00ff88); width: 0%; transition: width 0.3s; }
        .progress-text { text-align: center; margin-top: 10px; color: #aaa; }
        .results-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .results-table th, .results-table td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        .results-table th { background: rgba(255,255,255,0.1); color: #00d9ff; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .badge-valid { background: #00ff88; color: #1a1a2e; }
        .badge-invalid { background: #ff4444; color: #fff; }
        .badge-error { background: #ffaa00; color: #1a1a2e; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 WhatsApp Validator</h1>
        
        <div class="card">
            <h2>🔗 API Configuration</h2>
            <div class="form-group">
                <label>API URL (e.g., http://192.168.1.100:8080)</label>
                <input type="text" id="apiUrl" placeholder="http://192.168.1.100:8080">
            </div>
            <div class="form-group">
                <label>Instance Name</label>
                <input type="text" id="instanceName" placeholder="myinstance">
            </div>
            <div class="form-group">
                <label>API Key</label>
                <input type="text" id="apiKey" placeholder="Your API key">
            </div>
            <button class="btn-primary" onclick="saveSettings()">Save & Connect</button>
            <span id="connectionStatus" style="margin-left: 15px;">
                <span class="status-indicator status-disconnected"></span>
                <span id="statusText">Not connected</span>
            </span>
        </div>

        <div class="card">
            <h2>📲 Validate Numbers</h2>
            <div class="form-group">
                <label>Enter phone numbers (one per line, or comma/space separated, or in text)</label>
                <textarea id="phoneInput" rows="8" placeholder="1234567890&#10;9876543210&#10;5551234567&#10;Or paste any text containing numbers..."></textarea>
            </div>
            <button class="btn-success" onclick="startValidation()">Start Validation</button>
        </div>

        <div class="card progress-container" id="progressCard">
            <h2>⏳ Processing</h2>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">0 / 0 numbers processed</div>
        </div>

        <div class="card hidden" id="resultsCard">
            <h2>📊 Results</h2>
            <div class="stats">
                <div class="stat-box valid">
                    <div class="count" id="validCount">0</div>
                    <div>Valid ✅</div>
                </div>
                <div class="stat-box invalid">
                    <div class="count" id="invalidCount">0</div>
                    <div>Invalid ⛔️</div>
                </div>
                <div class="stat-box error">
                    <div class="count" id="errorCount">0</div>
                    <div>Error ⏳</div>
                </div>
            </div>
            <button class="btn-download" style="margin-top: 20px;" onclick="downloadResults()">📥 Download Results</button>
        </div>
    </div>

    <script>
        let socket;
        let currentTaskId = null;

        function initSocket() {
            socket = io();
            socket.on('progress', (data) => {
                const percent = (data.processed / data.total) * 100;
                document.getElementById('progressFill').style.width = percent + '%';
                document.getElementById('progressText').textContent = `${data.processed} / ${data.total} numbers processed`;
            });
            socket.on('batch_complete', (data) => {
                document.getElementById('progressText').textContent += ` (Batch ${data.batch}/${data.total} complete - resting)`;
            });
            socket.on('complete', (results) => {
                document.getElementById('progressCard').style.display = 'none';
                document.getElementById('resultsCard').classList.remove('hidden');
                document.getElementById('validCount').textContent = results.valid.length;
                document.getElementById('invalidCount').textContent = results.invalid.length;
                document.getElementById('errorCount').textContent = results.error.length;
            });
        }

        async function saveSettings() {
            const apiUrl = document.getElementById('apiUrl').value;
            const instanceName = document.getElementById('instanceName').value;
            const apiKey = document.getElementById('apiKey').value;

            const res = await fetch('/api/settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({api_url: apiUrl, instance_name: instanceName, api_key: apiKey})
            });
            const data = await res.json();
            
            const statusEl = document.getElementById('connectionStatus');
            if (data.success) {
                statusEl.innerHTML = '<span class="status-indicator status-connected"></span><span>Connected ✅</span>';
            } else {
                alert('Error: ' + data.error);
            }
        }

        async function loadSettings() {
            const res = await fetch('/api/settings');
            const data = await res.json();
            if (data.credentials && data.credentials.api_url) {
                document.getElementById('apiUrl').value = data.credentials.api_url;
                document.getElementById('instanceName').value = data.credentials.instance_name;
                document.getElementById('apiKey').value = data.credentials.api_key;
            }
            checkConnection();
        }

        async function checkConnection() {
            const res = await fetch('/api/check-connection');
            const data = await res.json();
            const statusEl = document.getElementById('connectionStatus');
            if (data.connected) {
                statusEl.innerHTML = '<span class="status-indicator status-connected"></span><span>Connected ✅</span>';
            } else {
                statusEl.innerHTML = '<span class="status-indicator status-disconnected"></span><span>Disconnected ⛔️</span>';
            }
        }

        async function startValidation() {
            const text = document.getElementById('phoneInput').value;
            if (!text.trim()) {
                alert('Please enter some phone numbers');
                return;
            }

            const res = await fetch('/api/validate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text: text})
            });
            const data = await res.json();
            
            if (data.success) {
                currentTaskId = data.task_id;
                document.getElementById('progressCard').style.display = 'block';
                document.getElementById('progressFill').style.width = '0%';
                document.getElementById('progressText').textContent = `Processing ${data.total} numbers...`;
                document.getElementById('resultsCard').classList.add('hidden');
            } else {
                alert('Error: ' + data.error);
            }
        }

        async function downloadResults() {
            if (currentTaskId) {
                window.location.href = '/api/download/' + currentTaskId;
            }
        }

        initSocket();
        loadSettings();
    </script>
</body>
</html>

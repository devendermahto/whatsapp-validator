version: '3'
services:
  evolution-api:
    image: atarrytech/evolution-api:latest
    container_name: evolution-api
    ports:
      - "8081:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - AUTHENTICATION_API_KEY=mypass123
    volumes:
      - evolution_instances:/evolution/instances
    restart: unless-stopped

  whatsapp-validator:
    build: .
    container_name: whatsapp-validator
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - validator_data:/app
    restart: unless-stopped
    depends_on:
      - evolution-api

volumes:
  evolution_instances:
    driver: local
  validator_data:
    driver: local
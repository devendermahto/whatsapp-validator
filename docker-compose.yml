version: '3'
services:
  evolution-api:
    image: atendai/evolution-api:v1.8.7
    container_name: evolution-api
    ports:
      - "8089:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - AUTHENTICATION_API_KEY=${API_KEY}
    volumes:
      - evolution_instances:/evolution/instances
    restart: unless-stopped

  whatsapp-validator:
    image: python:3.11-slim
    container_name: whatsapp-validator
    command: >
      sh -c "pip install --no-cache-dir flask flask-socketio pyTelegramBotAPI python-dotenv requests &&
             cd /tmp &&
             curl -sL https://raw.githubusercontent.com/devendermahto/whatsapp-validator/main/app.py -o app.py &&
             curl -sL https://raw.githubusercontent.com/devendermahto/whatsapp-validator/main/core.py -o core.py &&
             curl -sL https://raw.githubusercontent.com/devendermahto/whatsapp-validator/main/templates/index.html -o templates/index.html &&
             curl -sL https://raw.githubusercontent.com/devendermahto/whatsapp-validator/main/templates/login.html -o templates/login.html &&
             curl -sL https://raw.githubusercontent.com/devendermahto/whatsapp-validator/main/database.py -o database.py &&
             curl -sL https://raw.githubusercontent.com/devendermahto/whatsapp-validator/main/evolution_api.py -o evolution_api.py &&
             python app.py"
    ports:
      - "5050:5000"
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
    volumes:
      - validator_data:/app
    working_dir: /app
    restart: unless-stopped

volumes:
  evolution_instances:
  validator_data: